<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Admin — Dialpad Contact Centers</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%237C52FF'/%3E%3Cpath d='M10 8h5.5C19.64 8 23 11.36 23 16s-3.36 8-7.5 8H10V8zm3 3v10h2.5C17.98 21 20 18.98 20 16s-2.02-5-4.5-5H13z' fill='white'/%3E%3C/svg%3E">
  <meta property="og:title" content="AI Admin — Dialpad Contact Centers">
  <meta property="og:description" content="AI-powered contact center management. Proactive insights, bulk operations, emergency signals.">
  <style>
    :root {
      --bg:               #F9F9F9;
      --surface:          #FFFFFF;
      --border:           hsl(0 0% 11% / 0.11);
      --border-md:        hsl(0 0% 11% / 0.17);
      --text-1:           #1C1C1C;
      --text-2:           #3A3A3A;
      --text-3:           #535353;
      --hover-bg:         hsl(0 0% 11% / 0.06);
      --purple:           #7C52FF;
      --purple-hover:     #5023DD;
      --purple-surface:   #F5F0FF;
      --purple-border:    #D3BCFF;
      --purple-text:      #5023DD;
      --success:          #008E52;
      --success-surface:  #F6FCF5;
      --success-border:   #D1FF76;
      --warning:          #815008;
      --warning-surface:  #FFFAE5;
      --warning-border:   #FFDB80;
      --danger:           #D90A45;
      --danger-surface:   #FFF2F3;
      --danger-border:    #FF716F;
      --emergency:        #C4400C;
      --emergency-surface:#FEF3EC;
      --emergency-border: #F9B185;
      --ai-w:             378px;
      --hdr-h:            52px;
      --font:             -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", sans-serif;
      --fs: 14px; --fs-sm: 13px; --fs-xs: 12px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: var(--font); font-size: var(--fs); background: var(--bg); color: var(--text-1); height: 100vh; overflow: hidden; -webkit-font-smoothing: antialiased; line-height: 1.5; }

    /* ─── Shell ─── */
    .app { display: flex; height: 100vh; overflow: hidden; }

    /* ─── Skinny nav ─── */
    .skinny-nav { width: 50px; flex-shrink: 0; background: var(--bg); border-right: 1px solid var(--border); display: flex; flex-direction: column; align-items: center; padding: 12px 0; z-index: 20; }
    .skinny-logo { display: flex; align-items: center; justify-content: center; margin-bottom: 4px; }
    .skinny-icons { list-style: none; display: flex; flex-direction: column; align-items: center; gap: 10px; padding-top: 24px; flex: 1; }
    .skinny-icon { width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; border-radius: 50%; cursor: pointer; color: var(--text-3); transition: background .1s, color .1s; }
    .skinny-icon:hover { background: var(--hover-bg); color: var(--text-2); }
    .skinny-icon.active { background: hsl(0 0% 11% / 0.12); color: var(--text-1); }
    .skinny-icon svg { width: 15px; height: 15px; }
    .skinny-bottom { margin-top: auto; display: flex; flex-direction: column; align-items: center; gap: 4px; padding-bottom: 8px; }
    .skinny-avatar { width: 30px; height: 30px; border-radius: 50%; background: #008E52; display: flex; align-items: center; justify-content: center; color: #fff; font-size: 11px; font-weight: 600; cursor: pointer; }

    /* ─── Main wrap ─── */
    .main-wrap { flex: 1; min-width: 0; display: flex; flex-direction: column; overflow: hidden; }

    /* Header */
    .main-hdr { height: var(--hdr-h); border-bottom: 1px solid var(--border); background: var(--bg); display: flex; align-items: center; padding: 0 20px 0 14px; gap: 10px; flex-shrink: 0; }
    .hdr-office { display: flex; align-items: center; gap: 6px; font-size: var(--fs-sm); font-weight: 500; color: var(--text-1); cursor: pointer; padding: 5px 10px; border-radius: 6px; border: 1px solid var(--border-md); background: var(--surface); margin-right: 4px; }
    .hdr-office svg { color: var(--text-3); }
    .hdr-bc { display: flex; align-items: center; gap: 2px; font-size: var(--fs-xs); font-weight: 500; color: var(--text-3); text-transform: uppercase; letter-spacing: .04em; flex: 1; }
    .hdr-bc-sep { margin: 0 3px; }
    .hdr-bc-cur { color: var(--text-2); }
    .hdr-search { display: flex; align-items: center; gap: 6px; background: var(--surface); border: 1px solid var(--border-md); border-radius: 6px; padding: 5px 10px; font-size: var(--fs-xs); color: var(--text-3); width: 200px; height: 30px; }
    .hdr-search svg { width: 13px; height: 13px; flex-shrink: 0; }
    .btn { font-family: var(--font); font-size: var(--fs-sm); border-radius: 6px; padding: 6px 13px; cursor: pointer; font-weight: 500; border: none; line-height: 1; display: inline-flex; align-items: center; gap: 6px; transition: background .1s; white-space: nowrap; }
    .btn-primary { background: var(--purple); color: #fff; }
    .btn-primary:hover { background: var(--purple-hover); }
    .btn-base { background: var(--surface); color: var(--text-1); border: 1px solid var(--border-md); }
    .btn-base:hover { background: var(--bg); }

    /* Stats bar */
    .stats-bar { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 20px; display: flex; align-items: stretch; gap: 0; flex-shrink: 0; }
    .stat-item { padding: 11px 24px 11px 0; border-right: 1px solid var(--border); margin-right: 24px; display: flex; flex-direction: column; gap: 2px; }
    .stat-item:last-child { border-right: none; margin-right: 0; }
    .stat-num { font-size: 20px; font-weight: 600; letter-spacing: -.4px; line-height: 1.1; }
    .stat-num.issues { color: var(--danger); }
    .stat-lbl { font-size: 11px; color: var(--text-3); }

    /* Bulk bar */
    .bulk-bar { background: var(--purple-surface); border-bottom: 1px solid var(--purple-border); padding: 7px 20px; display: none; align-items: center; gap: 8px; flex-shrink: 0; }
    .bulk-bar.vis { display: flex; }
    .bulk-sel { font-size: var(--fs-xs); font-weight: 600; color: var(--purple-text); flex: 1; }
    .btn-bulk { font-size: 11px; font-weight: 600; color: var(--purple-text); background: white; border: 1px solid var(--purple-border); border-radius: 100px; padding: 3px 11px; cursor: pointer; font-family: var(--font); transition: background .1s; }
    .btn-bulk:hover { background: var(--purple-surface); }
    .btn-bulk-clr { font-size: var(--fs-xs); color: var(--text-3); background: none; border: none; cursor: pointer; font-family: var(--font); padding: 3px 8px; border-radius: 4px; }
    .btn-bulk-clr:hover { background: rgba(0,0,0,.05); color: var(--text-1); }

    /* Table area */
    .table-area { flex: 1; overflow-y: auto; background: var(--surface); }
    .cc-table { width: 100%; border-collapse: collapse; font-size: var(--fs-sm); }
    .cc-table thead th { position: sticky; top: 0; background: var(--bg); border-bottom: 1px solid var(--border-md); padding: 8px 12px; font-size: var(--fs-xs); font-weight: 600; color: var(--text-3); text-align: left; white-space: nowrap; z-index: 2; }
    .cc-table thead th:first-child { padding-left: 20px; width: 38px; }
    .cc-table thead th:last-child { padding-right: 20px; text-align: right; }
    .cc-table tbody tr { border-bottom: 1px solid var(--border); background: var(--surface); cursor: pointer; }
    .cc-table tbody tr:last-child { border-bottom: none; }
    .cc-table tbody tr:hover td { background: rgba(28,28,28,.02); }
    .cc-table tbody tr.row-sel td { background: var(--purple-surface); }
    .cc-table tbody tr.row-hl td { background: #FFFBEB; }
    .cc-table tbody tr.row-emg td { background: var(--emergency-surface); }
    .cc-table td { padding: 11px 12px; vertical-align: middle; }
    .cc-table td:first-child { padding-left: 20px; }
    .cc-table td:last-child { padding-right: 20px; text-align: right; }
    .cc-name { font-weight: 600; font-size: var(--fs-sm); }
    .cc-sub { font-size: var(--fs-xs); color: var(--text-3); margin-top: 1px; }
    .badge { display: inline-flex; align-items: center; font-size: 11px; font-weight: 500; border-radius: 100px; padding: 2px 8px; white-space: nowrap; gap: 3px; }
    .badge-on  { background: var(--success-surface); color: var(--success); }
    .badge-off { background: var(--danger-surface); color: var(--danger); }
    .badge-neu { background: var(--bg); color: var(--text-3); border: 1px solid var(--border); }
    .badge-warn{ background: var(--warning-surface); color: var(--warning); }
    .issue-ct { font-size: var(--fs-xs); font-weight: 600; color: var(--danger); }
    .issue-ct.ok { color: var(--text-3); font-weight: 400; }
    input[type="checkbox"] { width: 14px; height: 14px; accent-color: var(--purple); cursor: pointer; }
    .btn-row { font-family: var(--font); font-size: 11px; font-weight: 600; color: var(--purple-text); background: var(--purple-surface); border: 1px solid var(--purple-border); border-radius: 5px; padding: 3px 9px; cursor: pointer; transition: background .1s; }
    .btn-row:hover { background: var(--purple-border); }

    /* ─── AI Panel ─── */
    .ai-panel { width: var(--ai-w); flex-shrink: 0; background: var(--surface); border-left: 1px solid var(--border); display: flex; flex-direction: column; height: 100vh; position: sticky; top: 0; transition: width .2s ease; overflow: hidden; }
    .ai-panel.collapsed { width: 48px; }
    .ai-panel.collapsed .aip-insights, .ai-panel.collapsed .aip-body, .ai-panel.collapsed .aip-dock, .ai-panel.collapsed .aip-hd-left { display: none; }
    .ai-panel.collapsed .aip-header { justify-content: center; padding: 0; }

    .aip-header { height: var(--hdr-h); border-bottom: 1px solid var(--border); background: var(--bg); display: flex; align-items: center; padding: 0 12px; gap: 8px; flex-shrink: 0; }
    .aip-icon { width: 26px; height: 26px; background: var(--purple); border-radius: 6px; color: white; font-size: 12px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .aip-hd-left { flex: 1; display: flex; align-items: center; gap: 8px; min-width: 0; }
    .aip-title { font-size: var(--fs-sm); font-weight: 600; }
    .aip-issue-badge { font-size: 10px; font-weight: 700; background: var(--danger); color: white; padding: 1px 7px; border-radius: 100px; }
    .aip-toggle { width: 28px; height: 28px; background: none; border: none; border-radius: 5px; color: var(--text-3); cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background .1s; flex-shrink: 0; }
    .aip-toggle:hover { background: var(--hover-bg); color: var(--text-2); }

    /* Insights */
    .aip-insights { flex-shrink: 0; border-bottom: 1px solid var(--border); overflow-y: auto; max-height: 285px; }
    .ins-card { display: flex; align-items: flex-start; gap: 10px; padding: 10px 14px; border-bottom: 1px solid var(--border); transition: background .1s; }
    .ins-card:last-child { border-bottom: none; }
    .ins-card:hover { background: var(--bg); }
    .ins-card.ins-emg { background: var(--emergency-surface); border-left: 3px solid var(--emergency); }
    .ins-card.ins-emg:hover { background: #fee8d5; }
    .ins-card.ins-done { opacity: .4; pointer-events: none; }
    .ins-icon { font-size: 14px; flex-shrink: 0; margin-top: 2px; line-height: 1; }
    .ins-body { flex: 1; min-width: 0; }
    .ins-title { font-size: var(--fs-xs); font-weight: 600; color: var(--text-1); }
    .ins-desc { font-size: 11px; color: var(--text-3); margin-top: 2px; line-height: 1.4; }
    .btn-ins { flex-shrink: 0; font-size: 11px; font-weight: 600; font-family: var(--font); border-radius: 100px; padding: 3px 10px; cursor: pointer; transition: opacity .1s; }
    .btn-ins-fix { color: var(--purple-text); background: var(--purple-surface); border: 1px solid var(--purple-border); }
    .btn-ins-fix:hover { background: var(--purple-border); }
    .btn-ins-emg { color: white; background: var(--emergency); border: 1px solid var(--emergency-border); }
    .btn-ins-emg:hover { opacity: .85; }
    .ins-done-lbl { font-size: 11px; font-weight: 600; color: var(--success); flex-shrink: 0; }

    /* Chat */
    .aip-body { flex: 1; overflow-y: auto; padding: 12px 14px; display: flex; flex-direction: column; gap: 0; min-height: 0; }
    .chat-ai { display: flex; gap: 8px; margin-bottom: 8px; }
    .chat-av { width: 22px; height: 22px; border-radius: 50%; background: var(--purple); color: white; font-size: 10px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .chat-bub { background: var(--bg); border-radius: 0 8px 8px 8px; padding: 8px 11px; font-size: var(--fs-xs); line-height: 1.55; color: var(--text-1); max-width: 300px; }
    .chat-user { display: flex; justify-content: flex-end; margin-bottom: 8px; }
    .chat-user-bub { background: var(--purple); color: white; border-radius: 8px 0 8px 8px; padding: 8px 11px; font-size: var(--fs-xs); line-height: 1.55; max-width: 280px; }

    /* Preview card */
    .preview-card { margin-left: 30px; margin-bottom: 9px; background: var(--surface); border: 1px solid var(--border-md); border-radius: 0 8px 8px 8px; overflow: hidden; }
    .preview-card.pc-emg { border-left: 3px solid var(--emergency); }
    .pc-hd { padding: 8px 12px; background: var(--bg); border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 7px; font-size: var(--fs-xs); font-weight: 600; color: var(--text-2); }
    .pc-badge { font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: .04em; padding: 2px 7px; border-radius: 100px; }
    .pc-badge-fix { background: var(--purple); color: white; }
    .pc-badge-emg { background: var(--emergency); color: white; }
    .pc-badge-bulk { background: var(--purple-text); color: white; }
    .pc-changes { padding: 7px 12px; display: flex; flex-direction: column; }
    .pc-chg { display: flex; align-items: flex-start; gap: 7px; padding: 4px 0; border-bottom: 1px solid var(--border); font-size: var(--fs-xs); }
    .pc-chg:last-child { border-bottom: none; }
    .pc-tag { font-size: 9px; font-weight: 700; text-transform: uppercase; padding: 2px 5px; border-radius: 3px; flex-shrink: 0; margin-top: 1px; letter-spacing: .2px; }
    .pc-tag-on  { background: var(--success-surface); color: var(--success); }
    .pc-tag-off { background: var(--danger-surface); color: var(--danger); }
    .pc-tag-set { background: #E0F2FE; color: #0369A1; }
    .pc-tag-add { background: var(--purple-surface); color: var(--purple-text); }
    .pc-desc { color: var(--text-2); line-height: 1.4; flex: 1; }
    .pc-ccs { padding: 7px 12px 9px; border-top: 1px solid var(--border); }
    .pc-ccs-lbl { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: .05em; color: var(--text-3); margin-bottom: 5px; }
    .pc-cc-row { display: flex; align-items: center; gap: 6px; font-size: var(--fs-xs); color: var(--text-2); padding: 2px 0; }
    .pc-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
    .pc-dot-g  { background: var(--success); }
    .pc-dot-r  { background: var(--danger); }
    .pc-dot-e  { background: var(--emergency); }
    .pc-dot-p  { background: var(--purple); }
    .pc-footer { padding: 8px 12px; border-top: 1px solid var(--border); display: flex; gap: 7px; }
    .btn-pc-ok { font-size: var(--fs-xs); font-weight: 600; background: var(--purple); color: white; border: none; border-radius: 6px; padding: 5px 12px; cursor: pointer; font-family: var(--font); transition: background .1s; }
    .btn-pc-ok:hover { background: var(--purple-hover); }
    .btn-pc-ok.emg { background: var(--emergency); }
    .btn-pc-ok.emg:hover { background: #a33509; }
    .btn-pc-cancel { font-size: var(--fs-xs); font-weight: 500; background: none; border: 1px solid var(--border-md); color: var(--text-2); border-radius: 6px; padding: 5px 12px; cursor: pointer; font-family: var(--font); }
    .btn-pc-cancel:hover { background: var(--bg); }

    /* Typing */
    .typing-wrap { display: flex; gap: 8px; margin-bottom: 8px; }
    .typing-bub { display: flex; align-items: center; gap: 4px; background: var(--bg); border-radius: 0 8px 8px 8px; padding: 10px 12px; }
    .td { width: 5px; height: 5px; border-radius: 50%; background: var(--text-3); animation: tdBounce 1.2s infinite ease-in-out; }
    .td:nth-child(2) { animation-delay: .15s; }
    .td:nth-child(3) { animation-delay: .3s; }
    @keyframes tdBounce { 0%,60%,100% { transform:translateY(0); } 30% { transform:translateY(-4px); } }

    /* Dock */
    .aip-dock { flex-shrink: 0; border-top: 1px solid var(--border); padding: 10px 12px; display: flex; gap: 6px; }
    .aip-input { flex: 1; border: 1px solid var(--border-md); border-radius: 6px; padding: 7px 10px; font-size: var(--fs-sm); font-family: var(--font); color: var(--text-1); background: var(--bg); outline: none; transition: border-color .1s; }
    .aip-input:focus { border-color: var(--purple); background: var(--surface); }
    .aip-input::placeholder { color: var(--text-3); }
    .aip-send { background: var(--purple); border: none; border-radius: 6px; color: white; width: 34px; height: 34px; cursor: pointer; font-size: 14px; display: flex; align-items: center; justify-content: center; transition: background .1s; flex-shrink: 0; }
    .aip-send:hover { background: var(--purple-hover); }

    .msg-in { animation: msgIn .18s ease; }
    @keyframes msgIn { from { opacity:0; transform:translateY(4px); } to { opacity:1; transform:translateY(0); } }
  </style>
</head>

<div class="app">

  <!-- ── Skinny nav ── -->
  <div class="skinny-nav">
    <div class="skinny-logo">

<script>
// ─── DATA ───
const CCS = [
  { id:1,  name:'Sales East',            region:'US East', agents:23, live:true,  rec:false, greeting:false, hours:'Mon–Fri 9am–5pm',  routing:'Skills-based',   issues:['rec_off','greeting_missing'] },
  { id:2,  name:'Sales West',            region:'US West', agents:18, live:true,  rec:true,  greeting:true,  hours:'Mon–Fri 8am–8pm',  routing:'Round robin',    issues:['reporting_off'] },
  { id:3,  name:'Customer Support NA',   region:'US East', agents:41, live:true,  rec:true,  greeting:true,  hours:'Mon–Fri 9am–6pm',  routing:'Skills-based',   issues:[] },
  { id:4,  name:'Customer Support EU',   region:'EMEA',    agents:15, live:true,  rec:false, greeting:false, hours:'Mon–Fri 8am–6pm',  routing:'Skills-based',   issues:['rec_off','greeting_missing','reporting_off'] },
  { id:5,  name:'Technical Support',     region:'US West', agents:29, live:true,  rec:false, greeting:true,  hours:'24/7',             routing:'Priority queue', issues:['rec_off'] },
  { id:6,  name:'Billing & Accounts',    region:'US East', agents:12, live:true,  rec:true,  greeting:false, hours:'Mon–Fri 9am–5pm',  routing:'First available',issues:['greeting_missing'] },
  { id:7,  name:'Healthcare Support',    region:'Canada',  agents:8,  live:true,  rec:true,  greeting:true,  hours:'Mon–Fri 9am–6pm',  routing:'Skills-based',   issues:[] },
  { id:8,  name:'Enterprise CC',         region:'US West', agents:35, live:true,  rec:false, greeting:true,  hours:'Mon–Fri 8am–8pm',  routing:'Priority queue', issues:['rec_off'] },
  { id:9,  name:'LATAM Support',         region:'LATAM',   agents:14, live:false, rec:false, greeting:false, hours:'Not configured',   routing:'Not configured', issues:['rec_off','greeting_missing','reporting_off'] },
  { id:10, name:'Retail Support',        region:'US East', agents:19, live:true,  rec:true,  greeting:true,  hours:'Mon–Sat 9am–6pm',  routing:'Round robin',    issues:[] },
];

const INSIGHTS = [
  {
    id:'emergency',
    type:'emergency',
    icon:'🌀',
    title:'Storm warning — US East coast',
    desc:'Hurricane Ian may impact 4 contact centers. Recommend switching to after-hours routing.',
    affectedIds:[1,3,6,10],
    changes:[
      {tag:'set', d:'Switch to after-hours routing — Sales East, Customer Support NA, Billing, Retail'},
      {tag:'set', d:'Update IVR: "We may experience delays due to severe weather"'},
      {tag:'add', d:'Enable overflow to voicemail during storm window'},
      {tag:'add', d:'Notify all supervisors in affected regions'},
    ]
  },
  {
    id:'recording',
    type:'issue',
    icon:'🔴',
    title:'Call recording is off',
    desc:'5 contact centers have recording disabled — potential compliance risk.',
    affectedIds:[1,4,5,8,9],
    changes:[
      {tag:'on', d:'Enable automatic recording — Sales East'},
      {tag:'on', d:'Enable automatic recording — Customer Support EU'},
      {tag:'on', d:'Enable automatic recording — Technical Support'},
      {tag:'on', d:'Enable automatic recording — Enterprise CC'},
      {tag:'on', d:'Enable automatic recording — LATAM Support'},
    ]
  },
  {
    id:'greeting',
    type:'issue',
    icon:'🎙️',
    title:'Missing IVR greetings',
    desc:'4 contact centers have no greeting configured — callers hear silence.',
    affectedIds:[1,4,6,9],
    changes:[
      {tag:'set', d:'Generate AI greeting — Sales East'},
      {tag:'set', d:'Generate AI greeting — Customer Support EU'},
      {tag:'set', d:'Generate AI greeting — Billing & Accounts'},
      {tag:'set', d:'Generate AI greeting — LATAM Support'},
    ]
  },
  {
    id:'reporting',
    type:'issue',
    icon:'📊',
    title:'Reporting not configured',
    desc:'3 contact centers have no analytics enabled — no visibility into performance.',
    affectedIds:[2,4,9],
    changes:[
      {tag:'add', d:'Enable analytics dashboard — Sales West'},
      {tag:'add', d:'Enable analytics dashboard — Customer Support EU'},
      {tag:'add', d:'Enable analytics dashboard — LATAM Support'},
    ]
  },
];

// ─── STATE ───
const S = { sel: new Set(), resolved: new Set(), hl: new Set() };
const PENDING = {};

// ─── RENDER TABLE ───
function renderTable() {
  const tbody = document.getElementById('ccTbody');
  tbody.innerHTML = CCS.map(cc => {
    const isSel = S.sel.has(cc.id);
    const isHl  = S.hl.has(cc.id);
    const rowCls = isSel ? 'row-sel' : isHl ? 'row-hl' : '';
    const issues = cc.issues.length;
    return `<tr id="row-${cc.id}" class="${rowCls}" onclick="handleRowClick(${cc.id}, event)">
      <td><input type="checkbox" ${isSel ? 'checked' : ''} onclick="toggleSel(${cc.id}, event)"></td>
      <td>
        <div class="cc-name">${cc.name}</div>
        <div class="cc-sub">${cc.routing}</div>
      </td>
      <td style="color:var(--text-2);font-size:var(--fs-xs)">${cc.region}</td>
      <td style="color:var(--text-2);font-size:var(--fs-xs)">${cc.agents}</td>
      <td><span class="badge ${cc.rec ? 'badge-on' : 'badge-off'}">${cc.rec ? '✓ On' : '✕ Off'}</span></td>
      <td><span class="badge ${cc.greeting ? 'badge-on' : 'badge-off'}">${cc.greeting ? '✓ Set' : '✕ Missing'}</span></td>
      <td style="color:var(--text-2);font-size:var(--fs-xs)">${cc.hours}</td>
      <td><span class="issue-ct ${issues === 0 ? 'ok' : ''}">${issues === 0 ? '✓ Healthy' : `⚠ ${issues} issue${issues > 1 ? 's' : ''}`}</span></td>
      <td><button class="btn-row" onclick="viewCC(${cc.id}, event)">View</button></td>
    </tr>`;
  }).join('');
}

// ─── RENDER INSIGHTS ───
function renderInsights() {
  document.getElementById('aipInsights').innerHTML = INSIGHTS.map(ins => {
    const done = S.resolved.has(ins.id);
    const isEmg = ins.type === 'emergency';
    const btn = done
      ? `<span class="ins-done-lbl">✓ Applied</span>`
      : isEmg
        ? `<button class="btn-ins btn-ins-emg" onclick="fixInsight('${ins.id}')">Respond →</button>`
        : `<button class="btn-ins btn-ins-fix" onclick="fixInsight('${ins.id}')">Fix now</button>`;
    return `<div class="ins-card ${isEmg ? 'ins-emg' : ''} ${done ? 'ins-done' : ''}" id="ins-${ins.id}">
      <div class="ins-icon">${ins.icon}</div>
      <div class="ins-body">
        <div class="ins-title">${ins.title}</div>
        <div class="ins-desc">${ins.desc}</div>
      </div>
      ${btn}
    </div>`;
  }).join('');
}

// ─── SELECTION ───
function toggleSel(id, e) {
  e.stopPropagation();
  S.sel.has(id) ? S.sel.delete(id) : S.sel.add(id);
  updateBulkBar();
  renderTable();
}
function handleRowClick(id, e) {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'BUTTON') return;
  toggleSel(id, e);
}
function toggleSelAll(cb) {
  if (cb.checked) CCS.forEach(cc => S.sel.add(cc.id));
  else S.sel.clear();
  updateBulkBar();
  renderTable();
}
function clearSel() {
  S.sel.clear();
  document.getElementById('selAll').checked = false;
  updateBulkBar();
  renderTable();
}
function updateBulkBar() {
  const n = S.sel.size;
  document.getElementById('bulkBar').classList.toggle('vis', n > 0);
  document.getElementById('bulkSel').textContent = `${n} contact center${n !== 1 ? 's' : ''} selected`;
}

// ─── FIX INSIGHT ───
function fixInsight(insightId) {
  const ins = INSIGHTS.find(i => i.id === insightId);
  if (!ins) return;

  S.hl.clear();
  ins.affectedIds.forEach(id => S.hl.add(id));
  renderTable();
  const firstRow = document.getElementById('row-' + ins.affectedIds[0]);
  if (firstRow) firstRow.scrollIntoView({ behavior:'smooth', block:'nearest' });

  const isEmg = ins.type === 'emergency';
  addUserMsg(`${ins.icon} ${isEmg ? 'Respond to: ' : 'Fix: '}${ins.title}`);
  showTyping();

  const pcId = 'pc-' + Date.now();
  PENDING[pcId] = { insightId, affectedIds: ins.affectedIds, isEmg };

  setTimeout(() => {
    removeTyping();
    addAiMsg(`Identified <strong>${ins.affectedIds.length} contact centers</strong> affected. Review what will change:`);
    addPreviewCard(pcId, ins, ins.changes, ins.affectedIds, isEmg ? 'emg' : 'fix');
  }, 900);
}

// ─── BULK ACTIONS ───
function bulkAction(type) {
  const ids = [...S.sel];
  if (!ids.length) return;

  const templates = {
    greeting:  { icon:'🎙️', title:'Update IVR greetings',   changes: ids.map(id => ({ tag:'set', d:`Generate AI greeting — ${nameOf(id)}` })) },
    recording: { icon:'🔴', title:'Enable call recording',   changes: ids.map(id => ({ tag:'on',  d:`Enable recording — ${nameOf(id)}` })) },
    hours:     { icon:'🕐', title:'Apply business hours',    changes: ids.map(id => ({ tag:'set', d:`Set Mon–Fri 9am–5pm — ${nameOf(id)}` })) },
    ai:        { icon:'✦',  title:'Enable AI features',      changes: ids.map(id => ({ tag:'add', d:`Enable transcription + CSAT — ${nameOf(id)}` })) },
  };
  const t = templates[type];
  const pcId = 'pc-' + Date.now();
  PENDING[pcId] = { insightId: null, affectedIds: ids, isEmg: false, bulkType: type };

  addUserMsg(`${t.icon} ${t.title} for ${ids.length} selected`);
  showTyping();

  setTimeout(() => {
    removeTyping();
    addAiMsg(`Ready to update <strong>${ids.length} contact center${ids.length > 1 ? 's' : ''}</strong>. Review before applying:`);
    addPreviewCard(pcId, { icon: t.icon, title: t.title }, t.changes, ids, 'bulk');
  }, 700);
}

function nameOf(id) { return CCS.find(cc => cc.id === id)?.name || id; }

// ─── PREVIEW CARD ───
function addPreviewCard(pcId, ins, changes, affectedIds, mode) {
  const body = document.getElementById('aipBody');
  const isEmg = mode === 'emg';
  const badgeClass = mode === 'emg' ? 'pc-badge-emg' : mode === 'bulk' ? 'pc-badge-bulk' : 'pc-badge-fix';
  const badgeLabel = mode === 'emg' ? `Emergency · ${affectedIds.length} CCs` : mode === 'bulk' ? `${affectedIds.length} selected` : `Fix · ${affectedIds.length} CCs`;
  const dotClass = mode === 'emg' ? 'pc-dot-e' : mode === 'bulk' ? 'pc-dot-p' : 'pc-dot-r';
  const confirmLabel = mode === 'emg' ? `Apply emergency routing` : `Apply to ${affectedIds.length} contact centers`;

  const ccsHtml = affectedIds.map(id => `<div class="pc-cc-row"><span class="pc-dot ${dotClass}"></span>${nameOf(id)}</div>`).join('');
  const changesHtml = changes.map(c => `<div class="pc-chg"><span class="pc-tag pc-tag-${c.tag}">${c.tag}</span><span class="pc-desc">${c.d}</span></div>`).join('');

  const div = document.createElement('div');
  div.className = `preview-card msg-in${isEmg ? ' pc-emg' : ''}`;
  div.id = pcId;
  div.innerHTML = `
    <div class="pc-hd">
      ${ins.icon} ${ins.title}
      <span class="pc-badge ${badgeClass}">${badgeLabel}</span>
    </div>
    <div class="pc-changes">${changesHtml}</div>
    <div class="pc-ccs">
      <div class="pc-ccs-lbl">Affected contact centers</div>
      ${ccsHtml}
    </div>
    <div class="pc-footer">
      <button class="btn-pc-ok ${isEmg ? 'emg' : ''}" onclick="applyFix('${pcId}')">${confirmLabel}</button>
      <button class="btn-pc-cancel" onclick="cancelFix('${pcId}')">Cancel</button>
    </div>`;
  body.appendChild(div);
  body.scrollTop = body.scrollHeight;
}

// ─── APPLY / CANCEL ───
function applyFix(pcId) {
  const p = PENDING[pcId];
  delete PENDING[pcId];
  document.getElementById(pcId)?.remove();

  const ids = p.affectedIds;
  const n = ids.length;

  if (p.insightId === 'recording') {
    ids.forEach(id => {
      const cc = CCS.find(c => c.id === id);
      if (cc) { cc.rec = true; cc.issues = cc.issues.filter(i => i !== 'rec_off'); }
    });
    S.resolved.add('recording');
  } else if (p.insightId === 'greeting') {
    ids.forEach(id => {
      const cc = CCS.find(c => c.id === id);
      if (cc) { cc.greeting = true; cc.issues = cc.issues.filter(i => i !== 'greeting_missing'); }
    });
    S.resolved.add('greeting');
  } else if (p.insightId === 'reporting') {
    ids.forEach(id => {
      const cc = CCS.find(c => c.id === id);
      if (cc) { cc.issues = cc.issues.filter(i => i !== 'reporting_off'); }
    });
    S.resolved.add('reporting');
  } else if (p.insightId === 'emergency') {
    S.resolved.add('emergency');
  } else if (p.bulkType === 'recording') {
    ids.forEach(id => { const cc = CCS.find(c => c.id === id); if (cc) { cc.rec = true; cc.issues = cc.issues.filter(i => i !== 'rec_off'); } });
  } else if (p.bulkType === 'greeting') {
    ids.forEach(id => { const cc = CCS.find(c => c.id === id); if (cc) { cc.greeting = true; cc.issues = cc.issues.filter(i => i !== 'greeting_missing'); } });
  }

  S.hl.clear();
  if (p.insightId !== 'emergency') clearSel();

  const msg = p.insightId === 'emergency'
    ? `✅ Emergency routing applied to <strong>${n} contact centers</strong>. All admins notified. <span style="color:var(--text-3)">Revert available for 30 min.</span>`
    : `✅ Changes applied to <strong>${n} contact center${n > 1 ? 's' : ''}</strong>.`;

  addAiMsg(msg);
  updateIssueBadge();
  renderTable();
  renderInsights();
}

function cancelFix(pcId) {
  delete PENDING[pcId];
  document.getElementById(pcId)?.remove();
  S.hl.clear();
  renderTable();
  addAiMsg('Cancelled. No changes were made.');
}

// ─── VIEW CC ───
function viewCC(id, e) {
  e.stopPropagation();
  const cc = CCS.find(c => c.id === id);
  addUserMsg(`View: ${cc.name}`);
  showTyping();
  setTimeout(() => {
    removeTyping();
    const issueList = cc.issues.length
      ? cc.issues.map(i => ({ rec_off:'Recording is off', greeting_missing:'No IVR greeting', reporting_off:'Reporting not configured' }[i] || i))
          .map(t => `• ${t}`).join('<br>')
      : '• No issues — fully configured';
    addAiMsg(`<strong>${cc.name}</strong><br><span style="color:var(--text-3)">${cc.region} · ${cc.agents} agents · ${cc.live ? 'Live' : 'Setting up'}</span><br><br>${issueList}`);
  }, 500);
}

// ─── AI CHAT ───
function addAiMsg(html) {
  const body = document.getElementById('aipBody');
  const div = document.createElement('div');
  div.className = 'chat-ai msg-in';
  div.innerHTML = `<div class="chat-av">✦</div><div class="chat-bub">${html}</div>`;
  body.appendChild(div);
  body.scrollTop = body.scrollHeight;
}
function addUserMsg(text) {
  const body = document.getElementById('aipBody');
  const div = document.createElement('div');
  div.className = 'chat-user msg-in';
  div.innerHTML = `<div class="chat-user-bub">${text}</div>`;
  body.appendChild(div);
  body.scrollTop = body.scrollHeight;
}
function showTyping() {
  const body = document.getElementById('aipBody');
  const div = document.createElement('div');
  div.className = 'typing-wrap msg-in';
  div.id = 'typing-ind';
  div.innerHTML = `<div class="chat-av">✦</div><div class="typing-bub"><div class="td"></div><div class="td"></div><div class="td"></div></div>`;
  body.appendChild(div);
  body.scrollTop = body.scrollHeight;
}
function removeTyping() { document.getElementById('typing-ind')?.remove(); }

// ─── AI INPUT ───
function aipRun() {
  const inp = document.getElementById('aipInput');
  const val = inp.value.trim();
  if (!val) return;
  inp.value = '';

  addUserMsg(val);
  showTyping();

  setTimeout(() => {
    removeTyping();
    const v = val.toLowerCase();
    if (/record/i.test(v)) {
      const count = CCS.filter(cc => !cc.rec).length;
      addAiMsg(`Call recording is currently off for <strong>${count} contact centers</strong>. Want me to enable it for all of them, or just a specific set? You can also select CCs from the table first.`);
    } else if (/greeting|ivr/i.test(v)) {
      const count = CCS.filter(cc => !cc.greeting).length;
      addAiMsg(`<strong>${count} contact centers</strong> are missing an IVR greeting. I can generate an AI greeting for each one based on their name and industry — want me to preview the changes?`);
    } else if (/holiday|dec 25|christmas|jan 1/i.test(v)) {
      const pcId = 'pc-' + Date.now();
      const allIds = CCS.map(c => c.id);
      PENDING[pcId] = { insightId: null, affectedIds: allIds, isEmg: false, bulkType: 'hours_holiday' };
      addAiMsg(`I'll apply holiday hours for all <strong>${CCS.length} contact centers</strong>. Preview:`);
      addPreviewCard(pcId, { icon:'🗓', title:'Apply holiday hours Dec 25 & Jan 1' }, [
        {tag:'set', d:'Set Closed schedule — Dec 25 (all 10 CCs)'},
        {tag:'set', d:'Set Closed schedule — Jan 1 (all 10 CCs)'},
        {tag:'set', d:'Switch to holiday IVR greeting on those dates'},
        {tag:'add', d:'Overflow to voicemail during closure'},
      ], allIds, 'bulk');
    } else if (/hurricane|storm|weather|emergency/i.test(v)) {
      fixInsight('emergency');
    } else if (/report|analytics/i.test(v)) {
      const count = CCS.filter(cc => cc.issues.includes('reporting_off')).length;
      addAiMsg(`Reporting is not configured for <strong>${count} contact centers</strong>. Enabling it will add real-time dashboards and call analytics. Want me to apply to all affected CCs?`);
    } else {
      addAiMsg("I can help with that. Try selecting contact centers from the table and using the bulk action bar, or click <strong>Fix now</strong> on any insight above.");
    }
  }, 800);
}

// ─── UTILS ───
function updateIssueBadge() {
  const total = CCS.reduce((s, cc) => s + cc.issues.length, 0);
  document.getElementById('stat-issues').textContent = total;
  document.getElementById('aipBadge').textContent = total + ' issue' + (total !== 1 ? 's' : '');
}

function togglePanel() {
  const panel = document.getElementById('aiPanel');
  const collapsed = panel.classList.toggle('collapsed');
  const icon = document.querySelector('#aipToggle svg');
  icon.style.transform = collapsed ? 'rotate(180deg)' : '';
  document.getElementById('aipToggle').title = collapsed ? 'Expand' : 'Collapse';
}

// ─── INIT ───
document.addEventListener('DOMContentLoaded', () => {
  renderTable();
  renderInsights();
  addAiMsg('I\'ve scanned your <strong>10 contact centers</strong> and found <strong>8 open issues</strong>. Check the insights above — start with the storm warning, it needs urgent attention.');
  document.getElementById('aipInput').addEventListener('keydown', e => { if (e.key === 'Enter') aipRun(); });
});
</script>
